<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Vision Gallery</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .gallery {
        display: flex;
        gap: 40px;
        perspective: 1000px;
    }

    .card {
        width: 250px;
        height: 350px;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        transition: transform 0.5s ease, box-shadow 0.5s ease;
        cursor: pointer;
    }

    .card:hover {
        transform: rotateY(15deg) scale(1.05);
        box-shadow: 0 25px 50px rgba(0,0,0,0.6);
    }

    .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.7s ease;
    }

    .card:hover img {
        transform: scale(1.2);
    }

    .card .info {
        position: absolute;
        bottom: 0;
        width: 100%;
        padding: 20px;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        color: white;
        text-align: center;
        transform: translateY(100%);
        transition: transform 0.5s ease;
    }

    .card:hover .info {
        transform: translateY(0);
    }

    .info h3 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 1px;
    }

    .info p {
        font-size: 14px;
        opacity: 0.8;
    }

</style>
</head>

<body>

<div class="gallery">
    <div class="card">
        <img src="https://picsum.photos/400/600?random=1" alt="Mountain Adventure">
        <div class="info">
            <h3>Mountain Escape</h3>
            <p>Discover the thrill of heights</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/600?random=2" alt="Ocean Dream">
        <div class="info">
            <h3>Ocean Dream</h3>
            <p>Feel the calm of blue waves</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/600?random=3" alt="City Lights">
        <div class="info">
            <h3>City Lights</h3>
            <p>Experience urban magic</p>
        </div>
    </div>
</div>

</body>
</html>
