<!DOCTYPE html>
<html>
<head>
    <title>Frame Layout Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
        }

        .header {
            height: 100px;
            border: none;
            width: 100%;
        }

        .container {
            display: flex;
            height: calc(100vh - 100px);
        }

        .sidebar {
            width: 25%;
            border: none;
        }

        .main {
            width: 75%;
            border: none;
        }
    </style>
</head>

<body>

    <!-- Header Frame -->
    <iframe src="header.html" class="header"></iframe>

    <div class="container">
        <!-- Sidebar Frame -->
        <iframe src="sidebar.html" class="sidebar"></iframe>

        <!-- Main Content Frame -->
        <iframe src="main.html" class="main" name="mainFrame"></iframe>
    </div>

</body>
</html>
